<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Replica Pinterest | Busca y descubre imágenes</title>
    <meta
      name="description"
      content="Busca y descubre imágenes de todo tipo en tiempo real gracias a la API de Unsplash. Una réplica de Pinterest hecha con Vite y JavaScript."
    />
    <meta name="keywords" content="pinterest, imágenes, buscador de imágenes, unsplash, fotografía" />
    <meta name="author" content="Daniel Fabrega Alonso" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Replica Pinterest | Busca y descubre imágenes" />
    <meta
      property="og:description"
      content="Busca y descubre imágenes de todo tipo en tiempo real gracias a la API de Unsplash."
    />
    <meta property="og:locale" content="es_ES" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Replica Pinterest | Busca y descubre imágenes" />
    <meta
      name="twitter:description"
      content="Busca y descubre imágenes de todo tipo en tiempo real gracias a la API de Unsplash."
    />

    <meta name="theme-color" content="#e60023" />
  </head>
  <body>
    <header class="header">
      <div class="header-start">
        <button type="button" id="logo" class="logo" aria-label="Volver al inicio">
          <img src="/pinterest-logo.svg" class="logo-icon" alt="" />
        </button>
        <nav class="main-nav" aria-label="Navegación principal">
          <button type="button" class="nav-link nav-link--home">Inicio</button>
          <button type="button" class="nav-link">Explorar</button>
          <button type="button" class="nav-link">Crear</button>
        </nav>
      </div>

      <form id="search-form" class="search-form" role="search">
        <input
          type="search"
          name="query"
          id="search-input"
          class="search-input"
          placeholder="Buscar imágenes"
          aria-label="Buscar imágenes"
          autocomplete="off"
        />
      </form>

      <div class="header-end">
        <button type="button" class="icon-btn" aria-label="Notificaciones">
          <img src="/icon-bell.svg" class="icon-btn-icon" alt="" />
        </button>
        <button type="button" class="icon-btn" aria-label="Perfil">
          <img src="/icon-user.svg" class="icon-btn-icon" alt="" />
        </button>
        <button
          type="button"
          id="menu-toggle"
          class="menu-toggle"
          aria-label="Abrir menú"
          aria-expanded="false"
          aria-controls="mobile-menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <nav id="mobile-menu" class="mobile-menu" aria-label="Navegación móvil" hidden>
        <button type="button" class="nav-link nav-link--home">Inicio</button>
        <button type="button" class="nav-link">Explorar</button>
        <button type="button" class="nav-link">Crear</button>
        <button type="button" class="nav-link">Notificaciones</button>
        <button type="button" class="nav-link">Perfil</button>
      </nav>
    </header>

    <main id="grid" class="grid" aria-live="polite"></main>

    <footer class="footer">
      <div class="footer-content">
        <div class="footer-block">
          <h3>Sobre esta página</h3>
          <p>Proyecto de práctica hecho con Vite y JavaScript. Las imágenes se cargan en tiempo real desde Unsplash según lo que busques.</p>
        </div>
        <div class="footer-block">
          <h3>Contacto</h3>
          <p>Daniel Fabrega Alonso</p>
          <a href="mailto:dfal1ga@gmail.com">dfal1ga@gmail.com</a>
        </div>
        <div class="footer-block">
          <h3>Créditos</h3>
          <p>Fotografías cedidas por sus autores a través de <a href="https://unsplash.com" target="_blank" rel="noopener noreferrer">Unsplash</a>.</p>
        </div>
      </div>
      <p class="footer-bottom">© 2026 Daniel Fabrega Alonso</p>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
